name: Rewrite Post from URL

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'リライトするX投稿のURL（例: https://x.com/username/status/...）'
        required: true
        type: string

jobs:
  rewrite:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Rewrite post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/rewrite_from_url.py "${{ github.event.inputs.url }}"

      - name: Commit draft
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add draft/
          git diff --cached --quiet || git commit -m "draft: rewrite $(date +'%Y-%m-%d')"
          git push
